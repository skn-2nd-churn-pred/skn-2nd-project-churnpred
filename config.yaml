# =============================================================================
# 프로젝트 공통 설정 (최소)
# -----------------------------------------------------------------------------
# 경로와 Target 같은 "어디에나 필요한 값"만 둔다.
# 분리 방법 · 전처리 · 임계값 같은 "분석 결정"은 노트북과 docs 에서 직접 정한다.
# =============================================================================

project:
  random_state: 42

data:
  raw_path: "data/raw/cell2celltrain.csv"       # 학습용 원본 (원본 수정 금지)
  encoding: "utf-8"                             # 필요 시 cp949 / euc-kr
  sep: ","

target:
  column: "Churn"                  # 예측할 Target 컬럼
  positive_label: "Yes"            # "이탈(=1)"에 해당하는 원본 값
  meaning:
    "1": "이탈 고객 (churn)"
    "0": "유지 고객 (retained)"

model:
  # 노트북 02가 저장한 최종 모델 (리텐션 컬럼 제외 버전으로 팀 확정 — report.md A-3 참고)
  path: "models/histgradientboosting_without_retention_final.joblib"
  # 모델이 학습한 feature 이름·순서를 복원할 기준 파일.
  # 노트북은 Pipeline 객체만 저장하므로 feature 목록은 이 CSV의 컬럼에서 가져온다.
  feature_source: "data/processed/val.csv"
  # 이탈/유지를 가르는 예측 임계값. Validation에서 결정하고 Test에는 고정 적용한다.
  threshold: 0.5
  # 전처리기(StandardScaler) — 화면에 실제 단위로 값을 보여줄 때 사용
  preprocessor_path: "artifacts/preprocessor_without_retention.joblib"

output:
  metrics_path: "artifacts/metrics.csv"   # 성능 탭이 읽는 모델 비교표
